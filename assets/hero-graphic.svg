<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600" aria-hidden="true">
  <defs>
    <radialGradient id="earthGrad" cx="40%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1E3A6B"/>
      <stop offset="55%" stop-color="#0B1F3F"/>
      <stop offset="100%" stop-color="#000C1E"/>
    </radialGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#E2B859" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#E2B859" stop-opacity="0"/>
    </radialGradient>
    <filter id="cityLight" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Outer glow -->
  <circle cx="300" cy="300" r="290" fill="url(#glowGrad)"/>

  <!-- Earth body -->
  <circle cx="300" cy="300" r="230" fill="url(#earthGrad)"/>

  <!-- Stylized city-light continents (very rough shapes) -->
  <g fill="#E2B859" opacity="0.55" filter="url(#cityLight)">
    <!-- North America blob -->
    <path d="M150 170 Q200 150 240 180 Q260 220 240 260 Q200 280 170 260 Q140 220 150 170 Z"/>
    <!-- South America blob -->
    <path d="M220 320 Q250 310 260 350 Q255 400 230 430 Q210 420 210 380 Q210 340 220 320 Z"/>
    <!-- Europe blob -->
    <path d="M310 170 Q340 160 360 180 Q370 210 350 220 Q320 225 305 210 Q300 185 310 170 Z"/>
    <!-- Africa blob -->
    <path d="M320 240 Q350 235 365 270 Q370 330 345 360 Q325 350 320 310 Q310 270 320 240 Z"/>
    <!-- Asia blob -->
    <path d="M380 170 Q430 160 460 190 Q470 230 440 250 Q400 250 380 230 Q370 195 380 170 Z"/>
    <!-- Australia blob -->
    <path d="M440 330 Q470 325 480 350 Q475 375 450 380 Q430 370 435 350 Q435 335 440 330 Z"/>
  </g>

  <!-- Tiny city light dots -->
  <g fill="#FFE7A8" opacity="0.9">
    <circle cx="180" cy="200" r="1.2"/>
    <circle cx="200" cy="220" r="1"/>
    <circle cx="220" cy="210" r="1.3"/>
    <circle cx="195" cy="240" r="0.9"/>
    <circle cx="230" cy="260" r="1"/>
    <circle cx="170" cy="230" r="0.8"/>
    <circle cx="240" cy="380" r="1"/>
    <circle cx="220" cy="400" r="0.9"/>
    <circle cx="335" cy="190" r="1.1"/>
    <circle cx="350" cy="210" r="0.9"/>
    <circle cx="340" cy="280" r="1.1"/>
    <circle cx="350" cy="320" r="0.9"/>
    <circle cx="400" cy="200" r="1.2"/>
    <circle cx="420" cy="220" r="0.9"/>
    <circle cx="440" cy="240" r="1.1"/>
    <circle cx="460" cy="360" r="1"/>
  </g>

  <!-- Flight path arcs (gold, dashed) -->
  <g fill="none" stroke="#E2B859" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 6" opacity="0.85">
    <path d="M120 120 Q220 60 320 220"/>
    <path d="M520 140 Q420 80 320 220"/>
    <path d="M150 500 Q260 460 320 380"/>
    <path d="M510 480 Q420 440 320 380"/>
  </g>

  <!-- Pulsing dots at arc endpoints -->
  <g fill="#E2B859">
    <circle cx="120" cy="120" r="4"/>
    <circle cx="520" cy="140" r="4"/>
    <circle cx="150" cy="500" r="4"/>
    <circle cx="510" cy="480" r="4"/>
    <circle cx="320" cy="220" r="6"/>
    <circle cx="320" cy="380" r="6"/>
  </g>

  <!-- Faint world-map dot grid -->
  <g fill="#FFFFFF" opacity="0.06">
    <circle cx="80" cy="100" r="1.5"/>
    <circle cx="140" cy="100" r="1.5"/>
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="260" cy="100" r="1.5"/>
    <circle cx="80" cy="160" r="1.5"/>
    <circle cx="140" cy="160" r="1.5"/>
    <circle cx="200" cy="160" r="1.5"/>
    <circle cx="80" cy="220" r="1.5"/>
    <circle cx="140" cy="220" r="1.5"/>
    <circle cx="80" cy="280" r="1.5"/>
    <circle cx="500" cy="100" r="1.5"/>
    <circle cx="500" cy="160" r="1.5"/>
    <circle cx="500" cy="220" r="1.5"/>
    <circle cx="500" cy="280" r="1.5"/>
    <circle cx="80" cy="500" r="1.5"/>
    <circle cx="140" cy="500" r="1.5"/>
    <circle cx="500" cy="500" r="1.5"/>
  </g>
</svg>
